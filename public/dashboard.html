<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KT News Bot — Dashboard</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e63946;
      --text: #ececec;
      --muted: #888;
      --green: #2ecc71;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.02em; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .status-badge { font-size: 0.72rem; color: var(--green); border: 1px solid var(--green); border-radius: 20px; padding: 2px 10px; margin-left: auto; }
    #last-updated { font-size: 0.72rem; color: var(--muted); margin-left: 12px; }

    main { padding: 28px 32px; max-width: 1100px; margin: auto; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
    }
    .card label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 6px; }
    .card .value { font-size: 2rem; font-weight: 700; color: var(--text); }
    .card .sub { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

    h2 { font-size: 0.9rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }

    .bar-chart { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 28px; }
    .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-label { width: 80px; font-size: 0.82rem; color: var(--muted); }
    .bar-track { flex: 1; background: var(--border); border-radius: 4px; height: 10px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.5s ease; }
    .bar-count { font-size: 0.82rem; color: var(--text); width: 40px; text-align: right; }

    .activity { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 28px; }
    canvas { display: block; width: 100%; height: 80px; }

    footer { text-align: center; color: var(--muted); font-size: 0.72rem; padding: 24px; }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <div class="dot"></div>
    <h1>KT News Bot — Analytics</h1>
    <span class="status-badge" id="status-badge">ONLINE</span>
    <span id="last-updated"></span>
  </header>

  <main>
    <div class="grid">
      <div class="card">
        <label>Uptime</label>
        <div class="value" id="uptime">—</div>
        <div class="sub">since last restart</div>
      </div>
      <div class="card">
        <label>Memory</label>
        <div class="value" id="memory">—</div>
        <div class="sub">heap used</div>
      </div>
      <div class="card">
        <label>Total API Hits</label>
        <div class="value" id="total-hits">—</div>
        <div class="sub">all endpoints combined</div>
      </div>
      <div class="card">
        <label>Server Started</label>
        <div class="value" id="started-time" style="font-size:1rem">—</div>
        <div class="sub">Dubai time</div>
      </div>
    </div>

    <h2>Command Usage</h2>
    <div class="bar-chart" id="bar-chart">
      <!-- filled by JS -->
    </div>

    <h2>Request Activity (last 200 requests)</h2>
    <div class="activity">
      <canvas id="activity-canvas"></canvas>
    </div>
  </main>

  <footer>
    Refreshes every 30 seconds &mdash; <a href="/api/stats">Raw JSON</a> &mdash; <a href="/health">Health</a>
  </footer>

  <script>
    function fmtUptime(s) {
      const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
      return h > 0 ? `${h}h ${m}m` : m > 0 ? `${m}m ${sec}s` : `${sec}s`;
    }

    function fmtDate(iso) {
      return new Date(iso).toLocaleString("en-AE", { timeZone: "Asia/Dubai", hour12: true, hour: "2-digit", minute: "2-digit", day: "2-digit", month: "short" });
    }

    function drawActivity(timestamps) {
      const canvas = document.getElementById("activity-canvas");
      const ctx = canvas.getContext("2d");
      const W = canvas.parentElement.offsetWidth - 48;
      const H = 80;
      canvas.width = W;
      canvas.height = H;
      ctx.clearRect(0, 0, W, H);

      if (!timestamps.length) return;
      const now = Date.now();
      const window = 30 * 60 * 1000; // 30 min window
      const buckets = 60;
      const counts = new Array(buckets).fill(0);
      timestamps.forEach(ts => {
        const age = now - ts;
        if (age > window) return;
        const idx = Math.floor((1 - age / window) * (buckets - 1));
        counts[idx]++;
      });
      const maxCount = Math.max(...counts, 1);
      const barW = W / buckets;
      counts.forEach((c, i) => {
        const barH = (c / maxCount) * (H - 10);
        ctx.fillStyle = `rgba(230,57,70,${0.3 + 0.7 * (c / maxCount)})`;
        ctx.beginPath();
        ctx.roundRect(i * barW + 1, H - barH, barW - 2, barH, 2);
        ctx.fill();
      });
    }

    async function refresh() {
      try {
        const [statsRes, healthRes] = await Promise.all([
          fetch("/api/stats").then(r => r.json()),
          fetch("/health").then(r => r.json()),
        ]);

        document.getElementById("uptime").textContent = fmtUptime(statsRes.uptime);
        document.getElementById("memory").textContent = `${statsRes.memoryMB} MB`;
        document.getElementById("started-time").textContent = fmtDate(statsRes.startedAt);

        const cmds = statsRes.commands || {};
        const total = Object.values(cmds).reduce((a, b) => a + b, 0);
        document.getElementById("total-hits").textContent = total;

        const badge = document.getElementById("status-badge");
        badge.textContent = healthRes.status === "ok" ? "ONLINE" : "ERROR";
        badge.style.borderColor = healthRes.status === "ok" ? "var(--green)" : "var(--accent)";
        badge.style.color = healthRes.status === "ok" ? "var(--green)" : "var(--accent)";

        // Bar chart
        const chart = document.getElementById("bar-chart");
        const maxVal = Math.max(...Object.values(cmds), 1);
        chart.innerHTML = Object.entries(cmds).map(([k, v]) =>
          `<div class="bar-row">
            <span class="bar-label">${k}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${(v / maxVal) * 100}%"></div></div>
            <span class="bar-count">${v}</span>
          </div>`
        ).join("");

        drawActivity(statsRes.recentRequests || []);
        document.getElementById("last-updated").textContent = `Updated ${new Date().toLocaleTimeString("en-AE", { timeZone: "Asia/Dubai" })}`;
      } catch (e) {
        document.getElementById("status-badge").textContent = "OFFLINE";
        document.getElementById("status-badge").style.color = "var(--accent)";
      }
    }

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
